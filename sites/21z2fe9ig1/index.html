<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>چهارخونه</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: radial-gradient(circle at center, #1a1208, #0f0a05);
            color: #f5e8c7;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 100%;
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 2.6rem;
            margin: 8px 0 15px;
            color: #f5d9a0;
        }

        canvas {
            width: 100%;
            max-width: 560px;
            height: auto;
            border: 14px solid #5c4033;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.85);
            display: block;
            margin: 0 auto;
        }

        .controls {
            margin: 20px 0 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1.05rem;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #111;
            border: none;
        }

        .status {
            text-align: center;
            font-size: 1.5rem;
            padding: 12px 30px;
            background: rgba(0,0,0,0.6);
            border-radius: 50px;
            border: 2px solid #8b5a2b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>چهارخونه</h1>
        <canvas id="board" width="560" height="560"></canvas>

        <div class="controls">
            <button onclick="startNewGame()">🎮 بازی جدید</button>
            <button onclick="showSettings()">⚙️ تنظیمات</button>
        </div>

        <div class="status" id="status">نوبت: بازیکن سبز — مرحله چیدن</div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:1000;">
        <div style="background:#3c2a1f;padding:30px;border-radius:20px;border:8px solid #d4a373;max-width:400px;width:90%;text-align:center;">
            <h2>تنظیمات</h2>
            <select id="mode" style="width:100%;padding:12px;margin:10px 0;">
                <option value="pve" selected>با ربات</option>
                <option value="pvp">دو نفره</option>
            </select>
            <select id="difficulty" style="width:100%;padding:12px;margin:10px 0;">
                <option value="hard" selected>سخت</option>
            </select>
            <button onclick="saveSettings()" style="width:100%;padding:14px;margin-top:15px;">ذخیره</button>
        </div>
    </div>

    <!-- Win Modal -->
    <div id="winModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:1000;">
        <div style="background:#3c2a1f;padding:35px;border-radius:22px;border:8px solid #d4a373;max-width:400px;width:90%;text-align:center;">
            <h2 id="winTitle"></h2>
            <p id="winMessage"></p>
            <button onclick="closeWinModal()" style="padding:14px 45px;margin-top:20px;">بازی جدید</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const W = 560;

        const points = [
            {x: 120, y: 120}, {x: 280, y: 120}, {x: 440, y: 120},
            {x: 120, y: 280}, {x: 280, y: 280}, {x: 440, y: 280},
            {x: 120, y: 440}, {x: 280, y: 440}, {x: 440, y: 440}
        ];

        const connections = {
            0: [1, 3, 4],
            1: [0, 2, 4],
            2: [1, 4, 5],
            3: [0, 4, 6],
            4: [0, 1, 2, 3, 5, 6, 7, 8],
            5: [2, 4, 8],
            6: [3, 4, 7],
            7: [4, 6, 8],
            8: [4, 5, 7]
        };

        const winningLines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

        let boardState = Array(9).fill(null);
        let currentPlayer = 'p1';
        let phase = 'placement';
        let placed = {p1:0, p2:0};
        let selected = null;
        let mode = 'pve';
        let difficulty = 'hard';

        function draw() {
            ctx.clearRect(0,0,W,W);
            ctx.fillStyle = '#2c2118';
            ctx.fillRect(0,0,W,W);

            ctx.strokeStyle = '#d4a373';
            ctx.lineWidth = 20;
            ctx.strokeRect(85,85,390,390);

            ctx.lineWidth = 11;
            ctx.beginPath();
            ctx.moveTo(120,280); ctx.lineTo(440,280);
            ctx.moveTo(280,120); ctx.lineTo(280,440);
            ctx.stroke();

            ctx.fillStyle = '#e8d5b0';
            points.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 12, 0, Math.PI*2);
                ctx.fill();
            });

            boardState.forEach((pl, i) => {
                if (!pl) return;
                const p = points[i];
                const color = pl === 'p1' ? '#22c55e' : '#f97316';
                ctx.shadowBlur = 28;
                ctx.shadowColor = color;
                ctx.fillStyle = color;
                ctx.strokeStyle = '#111';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 26, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;
            });

            if (selected !== null) {
                const p = points[selected];
                ctx.shadowBlur = 22;
                ctx.shadowColor = '#fef08c';
                ctx.strokeStyle = '#fef08c';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 37, 0, Math.PI*2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        function getIndex(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const x = (clientX - rect.left) * (W / rect.width);
            const y = (clientY - rect.top) * (W / rect.height);
            for (let i = 0; i < 9; i++) {
                const dx = points[i].x - x;
                const dy = points[i].y - y;
                if (dx*dx + dy*dy < 1400) return i;
            }
            return -1;
        }

        function click(e) {
            const idx = getIndex(e.clientX, e.clientY);
            if (idx === -1) return;

            if (phase === 'placement') {
                if (boardState[idx] || placed[currentPlayer] >= 3) return;
                boardState[idx] = currentPlayer;
                placed[currentPlayer]++;

                if (checkWin(currentPlayer)) {
                    boardState[idx] = null;
                    placed[currentPlayer]--;
                    alert("نمی‌توانید در مرحله چیدن سه‌تایی بسازید!");
                    draw();
                    return;
                }

                if (placed.p1 === 3 && placed.p2 === 3) phase = 'movement';
                if (placed[currentPlayer] === 3) currentPlayer = currentPlayer === 'p1' ? 'p2' : 'p1';
            } else {
                if (selected === null) {
                    if (boardState[idx] === currentPlayer) selected = idx;
                } else if (isValid(selected, idx)) {
                    // Animation simulation
                    animateMove(selected, idx);
                    boardState[idx] = currentPlayer;
                    boardState[selected] = null;
                    selected = null;

                    if (checkWin(currentPlayer)) {
                        showWin(currentPlayer);
                        return;
                    }
                    currentPlayer = currentPlayer === 'p1' ? 'p2' : 'p1';
                } else selected = null;
            }

            draw();
            updateStatus();

            if (mode === 'pve' && currentPlayer === 'p2') setTimeout(aiTurn, 2000);
        }

        function animateMove(from, to) {
            // Simple visual feedback
            const start = points[from];
            const end = points[to];
            ctx.strokeStyle = '#fef08c';
            ctx.lineWidth = 8;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#fef08c';
            ctx.beginPath();
            ctx.moveTo(start.x, start.y);
            ctx.lineTo(end.x, end.y);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function isValid(from, to) {
            return boardState[to] === null && connections[from] && connections[from].includes(to);
        }

        function checkWin(pl) {
            return winningLines.some(l => l.every(i => boardState[i] === pl));
        }

        function updateStatus() {
            const name = currentPlayer === 'p1' ? 'سبز' : 'نارنجی';
            document.getElementById('status').textContent = `نوبت: ${name} — ${phase === 'placement' ? 'چیدن' : 'حرکت'}`;
        }

        function showWin(winner) {
            document.getElementById('winTitle').textContent = winner === 'p1' ? '🎉 سبز برنده شد!' : '🤖 ربات برنده شد!';
            document.getElementById('winMessage').textContent = 'تبریک!';
            document.getElementById('winModal').style.display = 'flex';
        }

        function closeWinModal() {
            document.getElementById('winModal').style.display = 'none';
            startNewGame();
        }

        function aiTurn() {
            if (phase === 'placement') {
                while (placed.p2 < 3) {
                    const empty = [];
                    for (let i = 0; i < 9; i++) if (!boardState[i]) empty.push(i);
                    if (!empty.length) break;
                    boardState[empty[Math.floor(Math.random() * empty.length)]] = 'p2';
                    placed.p2++;
                }
                phase = 'movement';
                currentPlayer = 'p1';
            } else {
                let moved = false;
                for (let i = 0; i < 9 && !moved; i++) {
                    if (boardState[i] !== 'p2') continue;
                    for (let t of connections[i] || []) {
                        if (!boardState[t]) {
                            boardState[t] = 'p2';
                            boardState[i] = null;
                            if (checkWin('p2')) { moved = true; break; }
                            boardState[t] = null;
                            boardState[i] = 'p2';
                        }
                    }
                }
                if (!moved) {
                    for (let i = 0; i < 9; i++) {
                        if (boardState[i] === 'p2') {
                            for (let t of connections[i] || []) {
                                if (!boardState[t]) {
                                    boardState[t] = 'p2';
                                    boardState[i] = null;
                                    moved = true;
                                    break;
                                }
                            }
                            if (moved) break;
                        }
                    }
                }
            }

            if (checkWin('p2')) showWin('p2');
            else {
                currentPlayer = 'p1';
                updateStatus();
            }
            draw();
        }

        function startNewGame() {
            boardState = Array(9).fill(null);
            placed = {p1:0, p2:0};
            phase = 'placement';
            currentPlayer = 'p1';
            selected = null;
            updateStatus();
            draw();
        }

        function showSettings() {
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function saveSettings() {
            mode = document.getElementById('mode').value;
            document.getElementById('settingsModal').style.display = 'none';
        }

        canvas.addEventListener('click', click);
        startNewGame();
    </script>
</body>
</html>
