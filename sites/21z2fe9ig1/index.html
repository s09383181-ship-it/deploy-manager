<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حذف شد</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tahoma,sans-serif;background:#0a0a14;color:#e8e8f0;min-height:100vh;display:grid;place-items:center;padding:20px;text-align:center}
.box{max-width:480px;padding:40px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px}
.icon{font-size:64px;margin-bottom:20px}
h1{font-size:28px;margin-bottom:12px;background:linear-gradient(135deg,#ef4444,#f59e0b);-webkit-background-clip:text;background-clip:text;color:transparent}
p{color:#94a3b8;line-height:1.8;margin-bottom:8px}
small{color:#64748b;display:block;margin-top:20px;font-size:12px}
</style>
</head>
<body>
<div class="box">
  <div class="icon">🗑️</div>
  <h1>این صفحه حذف شده</h1>
  <p>این لینک دیگر در دسترس نیست.</p>
  <p>صاحب پروژه این صفحه را از طریق دیپلوی من پاک کرده است.</p>
  <small>Deleted via Deploy Manager</small>
</div>
</body>
</html>
