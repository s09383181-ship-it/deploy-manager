<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دانلودر فارم لند</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Vazirmatn', sans-serif;
            background-color: #000;
        }

        #bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            pointer-events: none; /* اجازه عبور کلیک به لایه زیرین در صورت نیاز */
        }

        .card {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(241, 196, 15, 0.3);
            padding: 50px;
            border-radius: 40px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1), inset 0 0 20px rgba(241, 196, 15, 0.1);
            text-align: center;
            max-width: 450px;
            width: 85%;
            pointer-events: auto;
            animation: cardEntrance 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #f1c40f;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.6);
            letter-spacing: -1px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            padding: 18px;
            font-size: 1.2rem;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: bold;
            text-decoration: none;
            font-family: 'Vazirmatn', sans-serif;
        }

        .btn-new-link {
            background: linear-gradient(135deg, #1a1a1a, #333);
            color: #f1c40f;
            border: 1px solid #f1c40f;
        }

        .btn-direct {
            background: linear-gradient(135deg, #f1c40f, #d4ac0d);
            color: #000;
            box-shadow: 0 10px 20px rgba(241, 196, 15, 0.3);
        }

        .btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .creator-link {
            margin-top: 50px;
            color: #777;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .creator-link:hover { color: #f1c40f; }

        /* --- MODALS --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal {
            background: #111;
            border: 2px solid #f1c40f;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 350px;
            width: 80%;
            box-shadow: 0 0 40px rgba(241, 196, 15, 0.2);
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .modal p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.8;
            color: #eee;
        }

        .modal-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .modal-btn {
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-family: 'Vazirmatn';
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-confirm { background: #f1c40f; color: #000; }
        .btn-secondary { background: #333; color: #fff; }
        .btn-danger { background: #e74c3c; color: #fff; }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="ui-layer">
        <div class="card">
            <h1>دانلودر فارم لند</h1>
            
            <div class="btn-group">
                <a href="https://uplod.ir/bdwzonf0x2ri/Farm-City-v2.11.3-MOD._.htm" class="btn btn-new-link">لینک جدید</a>
                <button onclick="showFirstModal()" class="btn btn-direct">دانلود مستقیم</button>
            </div>

            <a href="https://rubika.ir/ZIDIAC_MAFIANIGHTS" target="_blank" class="creator-link">چنل سازنده</a>
        </div>
    </div>

    <!-- Modal 1: Warning -->
    <div class="modal-overlay" id="modal1">
        <div class="modal">
            <p>اگر از تاریخ 11 تیر بگذرد بخشه دانلود مستقیم کار نمی‌کند و باید وارد بخش لینک جدید شوید</p>
            <div class="modal-btns">
                <button class="modal-btn btn-confirm" onclick="showSecondModal()">متوجه شدم</button>
                <button class="modal-btn btn-secondary" onclick="closeAll()">انصراف</button>
            </div>
        </div>
    </div>

    <!-- Modal 2: Choice -->
    <div class="modal-overlay" id="modal2">
        <div class="modal">
            <p>حالا انتخاب کنید:</p>
            <div class="modal-btns">
                <button class="modal-btn btn-danger" onclick="goToNewLink()">از تاریخ گذشته</button>
                <button class="modal-btn btn-confirm" onclick="goToDirectLink()">هنوز از تاریخ نگذشته</button>
            </div>
        </div>
    </div>

    <script>
        // --- DARK BATMAN 3D CANVAS ENGINE ---
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        const directLink = "https://s6.uplod.ir:182/d/2k2x4vuf4hvhuf6tecnyp43iwoqzgnmajcipo2tmp6g2dhqgf5dsk6ztwgl34z4vnz77hefm/Farm-City-v2.11.3-MOD._";
        const newLink = "https://uplod.ir/bdwzonf0x2ri/Farm-City-v2.11.3-MOD._.htm";

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            // Creating more particles for a thicker "smoke/dust" texture
            for (let i = 0; i < 250; i++) {
                particles.push(new Particle());
            }
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = (Math.random() - 0.5) * width * 2;
                this.y = (Math.random() - 0.5) * height * 2;
                this.z = Math.random() * width; 
                this.size = Math.random() * 3 + 1;
                this.speed = Math.random() * 2 + 0.5;
                this.color = Math.random() > 0.5 ? 'rgba(241, 196, 15, 0.2)' : 'rgba(50, 50, 50, 0.3)';
            }
            update() {
                this.z -= this.speed;
                if (this.z <= 0) this.reset();
            }
            draw() {
                let scale = width / this.z;
                let px = (this.x * scale) + width / 2;
                let py = (this.y * scale) + height / 2;
                let s = this.size * scale;

                if (px > 0 && px < width && py > 0 && py < height) {
                    ctx.beginPath();
                    ctx.arc(px, py, s, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
            }
        }

        function animate() {
            // Cinematic black with a bit of grain
            ctx.fillStyle = '#020202';
            ctx.fillRect(0, 0, width, height);

            // Subtle vignette effect
            const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
            grad.addColorStop(0, 'transparent');
            grad.addColorStop(1, 'rgba(0,0,0,0.8)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();

        // --- LOGIC FUNCTIONS ---

        function showFirstModal() {
            document.getElementById('modal1').style.display = 'flex';
        }

        function showSecondModal() {
            document.getElementById('modal1').style.display = 'none';
            document.getElementById('modal2').style.display = 'flex';
        }

        function closeAll() {
            document.getElementById('modal1').style.display = 'none';
            document.getElementById('modal2').style.display = 'none';
        }

        function goToNewLink() {
            window.location.href = newLink;
        }

        function goToDirectLink() {
            window.location.href = directLink;
        }
    </script>
</body>
</html>
